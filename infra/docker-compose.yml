version: "3.9"

services:

  # ------------------ DATABASE ------------------
  postgres:
    image: ankane/pgvector:latest
    container_name: vidrag_postgres
    restart: always
    environment:
      POSTGRES_USER: vidrag
      POSTGRES_PASSWORD: vidrag
      POSTGRES_DB: vidrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidrag"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------ REDIS ------------------
  redis:
    image: redis:7
    container_name: vidrag_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ------------------ INGESTION ------------------
  ingestion:
    build:
      context: ../services/ingestion
    container_name: vidrag_ingestion
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HF_TOKEN: ${HF_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/ingestion/data:/app/data
      - ./cookies.txt:/app/cookies.txt
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8001/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ------------------ PROCESSING API ------------------
  processing_api:
    build:
      context: ../services/processing
    container_name: vidrag_processing_api
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------ PROCESSING WORKER ------------------
  processing_worker:
    build:
      context: ../services/processing
    container_name: vidrag_worker
    restart: always
    command: celery -A worker.celery worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  # ------------------ SEARCH ------------------
  search:
    build:
      context: ../services/search
    container_name: vidrag_search
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - faiss_data:/app/faiss_data   # 🔥 persistent vector store
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ------------------ GATEWAY ------------------
  gateway:
    build:
      context: ../services/gateway
    container_name: vidrag_gateway
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      ingestion:
        condition: service_healthy
      search:
        condition: service_healthy
      processing_api:
        condition: service_started
      redis:
        condition: service_started

  # ------------------ QA (RAG) ------------------
  qa:
    build:
      context: ../services/qa
    container_name: vidrag_qa
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      SEARCH_URL: http://search:8003/search
      REDIS_HOST: redis
      LLM_URL: http://host.docker.internal:8080/completion
      CONTEXT_LIMIT: 3
      TOP_K: 5
    depends_on:
      search:
        condition: service_healthy
      redis:
        condition: service_healthy

# ------------------ VOLUMES ------------------
volumes:
  pgdata:
  faiss_data: